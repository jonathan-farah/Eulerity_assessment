# Application identity
spring.application.name=task-manager

# In-memory H2 datasource settings
spring.datasource.url=jdbc:h2:mem:taskdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA/Hibernate behavior
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Embedded H2 console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# AI provider defaults (override api-key in environment or local config)
ai.openai.base-url=https://api.openai.com/v1
ai.openai.model=gpt-4o-mini
ai.openai.api-key=
